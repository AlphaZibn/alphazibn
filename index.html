<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlphaZibn • Surreal Visions</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap');
        
        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            background: #050505; 
            color: #e5e5e5; 
            margin: 0; 
            padding: 0; 
        }
        .heading { font-family: 'Playfair Display', serif; }

        .hero { 
            height: 100vh; 
            background: linear-gradient(rgba(5,5,5,0.8), rgba(5,5,5,0.95)), url('https://i.imgur.com/GbIHN4w.jpg') center/cover; 
            display: flex; align-items: center; justify-content: center; text-align: center;
        }

        .gallery { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); 
            gap: 50px; 
            padding: 100px 40px; 
            max-width: 1700px; 
            margin: 0 auto; 
        }

        .card { 
            background: #0a0a0a; 
            border-radius: 12px; 
            overflow: hidden; 
            cursor: pointer; 
            transition: all 0.5s; 
        }
        .card:hover { transform: translateY(-15px); }

        .frame { padding: 28px; background: #111; border: 18px solid #1a1a1a; }
        .frame img { width: 100%; height: 420px; object-fit: cover; }

        /* Cart */
        .cart-drawer {
            position: fixed;
            top: 0;
            right: -480px;
            width: 480px;
            height: 100%;
            background: #0a0a0a;
            box-shadow: -10px 0 30px rgba(0,0,0,0.8);
            transition: right 0.4s ease;
            z-index: 3000;
            overflow-y: auto;
        }
        .cart-drawer.open { right: 0; }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header style="position: sticky; top: 0; background: rgba(5,5,5,0.95); backdrop-filter: blur(12px); z-index: 100; border-bottom: 1px solid #222;">
        <div style="max-width: 1700px; margin: 0 auto; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center;">
            <h1 class="heading" style="font-size: 2.2rem;">AlphaZibn</h1>
            <div onclick="toggleCart()" style="cursor: pointer; font-size: 1.6rem; position: relative;">
                🛒 <span id="cart-count" style="position:absolute; top:-8px; right:-8px; background:#d4af37; color:black; font-size:0.9rem; width:20px; height:20px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:bold;">0</span>
            </div>
        </div>
    </header>

    <div class="hero">
        <div>
            <h1 class="heading" style="font-size: 6.8rem; margin-bottom: 10px;">AlphaZibn</h1>
            <p style="font-size: 1.6rem; letter-spacing: 6px; opacity: 0.85;">SURREAL VISIONS</p>
        </div>
    </div>

    <section id="shop" class="gallery"></section>

    <!-- CART DRAWER -->
    <div id="cart-drawer" class="cart-drawer">
        <div style="padding: 30px;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
                <h2 class="heading" style="font-size:2rem;">Your Cart</h2>
                <span onclick="toggleCart()" style="font-size:2.5rem; cursor:pointer;">×</span>
            </div>
            
            <div id="cart-items" style="min-height:300px;"></div>
            
            <div style="margin-top:30px; padding-top:20px; border-top:1px solid #333;">
                <div style="display:flex; justify-content:space-between; font-size:1.4rem; margin-bottom:20px;">
                    <span>Total</span>
                    <span id="cart-total" style="color:#d4af37; font-weight:bold;">$0</span>
                </div>
                <button onclick="checkout()" style="width:100%; padding:18px; background:#d4af37; color:black; border:none; font-size:1.3rem; border-radius:8px; cursor:pointer; font-weight:600;">
                    Proceed to Checkout
                </button>
            </div>
        </div>
    </div>

    <!-- Lightbox -->
    <div id="lightbox" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.98); z-index:2000; align-items:center; justify-content:center; padding:20px; cursor:zoom-out;">
        <img id="lightbox-image" style="max-width:96%; max-height:94vh; border:12px solid #1a1a1a;" alt="">
    </div>

    <script>
        let cart = [];

        document.addEventListener("DOMContentLoaded", function() {
            const gallery = document.getElementById('shop');
            
            const paintings = [ /* все 14 картин как раньше */ 
                {title:"Cosmic Fracture", price:3200, img:"https://i.imgur.com/AF4KG1u.jpg"},
                {title:"Eye of the Vortex", price:2800, img:"https://i.imgur.com/EEOQNNJ.jpg"},
                {title:"The Void Prophet", price:3500, img:"https://i.imgur.com/GbIHN4w.jpg"},
                {title:"Multiversal Mind", price:2950, img:"https://i.imgur.com/bYa67XG.jpg"},
                {title:"Framed Eternity", price:2450, img:"https://i.imgur.com/TBcUee7.jpg"},
                {title:"Devouring Cosmos", price:3100, img:"https://i.imgur.com/N9cTjGr.jpg"},
                {title:"Celestial Embrace", price:2700, img:"https://i.imgur.com/Q13UqiZ.jpg"},
                {title:"Symphony of Madness", price:3800, img:"https://i.imgur.com/rlbRcTr.jpg"},
                {title:"Architect of Dreams", price:2900, img:"https://i.imgur.com/P06MY6x.jpg"},
                {title:"The Last Gate", price:3300, img:"https://i.imgur.com/errVUy7.jpg"},
                {title:"Eternal Flow", price:2600, img:"https://i.imgur.com/9ylCADA.jpg"},
                {title:"Mind Portal", price:3150, img:"https://i.imgur.com/42epfIs.jpg"},
                {title:"Cosmic Symphony", price:3400, img:"https://i.imgur.com/PX9FLqq.jpg"},
                {title:"The Final Vision", price:3600, img:"https://i.imgur.com/RnhfBpt.jpg"}
            ];

            paintings.forEach(p => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="frame">
                        <img src="${p.img}" alt="${p.title}">
                    </div>
                    <div style="padding:25px 30px;">
                        <h3 class="heading" style="font-size:1.7rem;">${p.title}</h3>
                        <p style="color:#d4af37; font-size:1.8rem; margin-top:8px;">$${p.price}</p>
                        <button onclick="addToCart(event, ${p.price}, '${p.title}', '${p.img}');" 
                                style="margin-top:15px; width:100%; padding:10px; background:#d4af37; color:black; border:none; border-radius:6px; cursor:pointer;">
                            Add to Cart
                        </button>
                    </div>
                `;
                card.querySelector('.frame img').parentElement.parentElement.onclick = (e) => {
                    if (!e.target.closest('button')) showLightbox(p.img);
                };
                gallery.appendChild(card);
            });
        });

        function addToCart(e, price, title, img) {
            e.stopImmediatePropagation();
            cart.push({title, price, img});
            updateCart();
            alert(`✅ ${title} добавлен в корзину`);
        }

        function updateCart() {
            document.getElementById('cart-count').textContent = cart.length;
        }

        function toggleCart() {
            const drawer = document.getElementById('cart-drawer');
            if (drawer.classList.contains('open')) {
                drawer.classList.remove('open');
            } else {
                renderCart();
                drawer.classList.add('open');
            }
        }

        function renderCart() {
            const container = document.getElementById('cart-items');
            container.innerHTML = '';
            let total = 0;

            cart.forEach((item, index) => {
                total += item.price;
                const div = document.createElement('div');
                div.style = "display:flex; gap:15px; margin-bottom:25px; padding-bottom:20px; border-bottom:1px solid #222;";
                div.innerHTML = `
                    <img src="${item.img}" style="width:80px; height:80px; object-fit:cover;">
                    <div style="flex:1;">
                        <h4>${item.title}</h4>
                        <p style="color:#d4af37;">$${item.price}</p>
                    </div>
                    <button onclick="removeFromCart(${index});" style="background:none; border:none; color:#999; font-size:1.4rem; cursor:pointer;">×</button>
                `;
                container.appendChild(div);
            });

            document.getElementById('cart-total').textContent = '$' + total;
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCart();
            renderCart();
        }

        function checkout() {
            if (cart.length === 0) return;
            alert("🎉 Спасибо! Это демо-сайт.\n\nВ реальной версии здесь будет подключена оплата через Stripe или PayPal.");
            cart = [];
            updateCart();
            toggleCart();
        }

        function showLightbox(src) {
            const lb = document.getElementById('lightbox');
            document.getElementById('lightbox-image').src = src;
            lb.style.display = 'flex';
        }

        document.getElementById('lightbox').addEventListener('click', function() {
            this.style.display = 'none';
        });
    </script>
</body>
</html>
