<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlphaZibn • Surreal Visions</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap');
        
        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            background: #050505; 
            color: #e5e5e5; 
            margin: 0; 
            padding: 0; 
        }
        .heading { font-family: 'Playfair Display', serif; }

        .hero { 
            height: 100vh; 
            background: linear-gradient(rgba(5,5,5,0.8), rgba(5,5,5,0.95)), 
                        url('https://i.imgur.com/GbIHN4w.jpg') center/cover; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            text-align: center;
        }

        .gallery { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); 
            gap: 50px; 
            padding: 100px 40px; 
            max-width: 1700px; 
            margin: 0 auto; 
        }

        .card { 
            background: #0a0a0a; 
            border-radius: 12px; 
            overflow: hidden; 
            cursor: pointer; 
            transition: all 0.5s; 
        }
        .card:hover { transform: translateY(-15px); }

        .frame { 
            padding: 28px; 
            background: #111; 
            border: 18px solid #1a1a1a; 
        }
        .frame img { 
            width: 100%; 
            height: 420px; 
            object-fit: cover; 
        }

        /* Улучшенный Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.98);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 20px;
            cursor: zoom-out;
        }
        .lightbox img {
            max-width: 96%;
            max-height: 94vh;
            border: 12px solid #1a1a1a;
            box-shadow: 0 0 60px rgba(0,0,0,0.9);
            object-fit: contain;
        }
    </style>
</head>
<body>

    <div class="hero">
        <div>
            <h1 class="heading" style="font-size: 6.8rem; margin-bottom: 10px;">AlphaZibn</h1>
            <p style="font-size: 1.6rem; letter-spacing: 6px; opacity: 0.85;">SURREAL VISIONS</p>
        </div>
    </div>

    <section id="shop" class="gallery"></section>

    <!-- Lightbox -->
    <div id="lightbox" class="lightbox">
        <img id="lightbox-image" alt="">
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const gallery = document.getElementById('shop');
            
            const paintings = [
                {title:"Cosmic Fracture", price:3200, img:"https://i.imgur.com/AF4KG1u.jpg"},
                {title:"Eye of the Vortex", price:2800, img:"https://i.imgur.com/EEOQNNJ.jpg"},
                {title:"The Void Prophet", price:3500, img:"https://i.imgur.com/GbIHN4w.jpg"},
                {title:"Multiversal Mind", price:2950, img:"https://i.imgur.com/bYa67XG.jpg"},
                {title:"Framed Eternity", price:2450, img:"https://i.imgur.com/TBcUee7.jpg"},
                {title:"Devouring Cosmos", price:3100, img:"https://i.imgur.com/N9cTjGr.jpg"},
                {title:"Celestial Embrace", price:2700, img:"https://i.imgur.com/Q13UqiZ.jpg"},
                {title:"Symphony of Madness", price:3800, img:"https://i.imgur.com/rlbRcTr.jpg"},
                {title:"Architect of Dreams", price:2900, img:"https://i.imgur.com/P06MY6x.jpg"},
                {title:"The Last Gate", price:3300, img:"https://i.imgur.com/errVUy7.jpg"},
                {title:"Eternal Flow", price:2600, img:"https://i.imgur.com/9ylCADA.jpg"},
                {title:"Mind Portal", price:3150, img:"https://i.imgur.com/42epfIs.jpg"},
                {title:"Cosmic Symphony", price:3400, img:"https://i.imgur.com/PX9FLqq.jpg"},
                {title:"The Final Vision", price:3600, img:"https://i.imgur.com/RnhfBpt.jpg"}
            ];

            paintings.forEach(p => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="frame">
                        <img src="${p.img}" alt="${p.title}">
                    </div>
                    <div style="padding:25px 30px;">
                        <h3 class="heading" style="font-size:1.7rem;">${p.title}</h3>
                        <p style="color:#d4af37; font-size:1.8rem; margin-top:8px;">$${p.price}</p>
                    </div>
                `;
                card.onclick = () => showLightbox(p.img, p.title, p.price);
                gallery.appendChild(card);
            });
        });

        function showLightbox(src, title, price) {
            const lightbox = document.getElementById('lightbox');
            const img = document.getElementById('lightbox-image');
            img.src = src;
            lightbox.style.display = 'flex';
        }

        // Закрытие
        document.getElementById('lightbox').addEventListener('click', function() {
            this.style.display = 'none';
        });
    </script>
</body>
</html>
