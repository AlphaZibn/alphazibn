<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlphaZibn • Surreal Visions</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap');
        
        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            background: #050505; 
            color: #e5e5e5; 
            margin: 0; 
            padding: 0; 
            overflow-x: hidden;
        }
        .heading { font-family: 'Playfair Display', serif; letter-spacing: -2px; }

        /* Hero */
        .hero { 
            height: 100vh; 
            background: linear-gradient(rgba(5,5,5,0.75), rgba(5,5,5,0.9)), 
                        url('https://i.imgur.com/GbIHN4w.jpg') center/cover no-repeat; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            text-align: center;
            position: relative;
        }
        .hero::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 200px;
            background: linear-gradient(transparent, #050505);
        }

        /* Gallery */
        .gallery { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); 
            gap: 50px; 
            padding: 100px 40px; 
            max-width: 1600px; 
            margin: 0 auto; 
        }
        .card { 
            background: #0a0a0a; 
            border-radius: 12px; 
            overflow: hidden; 
            cursor: pointer; 
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1); 
        }
        .card:hover { 
            transform: translateY(-20px); 
            box-shadow: 0 40px 80px rgba(0,0,0,0.8); 
        }
        .frame { 
            padding: 30px; 
            background: #111; 
            border: 16px solid #1a1a1a; 
            box-shadow: inset 0 0 40px rgba(0,0,0,0.9); 
        }
        .frame img { 
            width: 100%; 
            height: 420px; 
            object-fit: cover; 
            border: 1px solid #222; 
            transition: transform 0.8s ease;
        }
        .card:hover .frame img { 
            transform: scale(1.03); 
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.97);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 30px;
        }
        .modal-content {
            max-width: 1000px;
            width: 100%;
            background: #0a0a0a;
            border: 1px solid #333;
        }
        .modal img {
            width: 100%;
            height: auto;
            display: block;
        }
        .close {
            position: absolute;
            top: 30px;
            right: 40px;
            font-size: 50px;
            color: #aaa;
            cursor: pointer;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="hero">
        <div>
            <h1 class="heading" style="font-size: 6.5rem; color: white; margin-bottom: 10px;">AlphaZibn</h1>
            <p style="font-size: 1.6rem; letter-spacing: 4px; opacity: 0.8;">SURREAL VISIONS</p>
            <p style="margin-top: 60px; font-size: 1.3rem; max-width: 500px; margin-left: auto; margin-right: auto;">
                Original artworks by Valerii Kudziev
            </p>
        </div>
    </div>

    <section id="shop" class="gallery"></section>

    <!-- Modal -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="close" onclick="closeModal()">×</div>
            <img id="modal-image" alt="">
            <div style="padding: 35px 40px; background: #0a0a0a;">
                <h3 id="modal-title" class="heading" style="font-size: 2.2rem; margin-bottom: 8px;"></h3>
                <p id="modal-price" style="color: #d4af37; font-size: 1.8rem;"></p>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const gallery = document.getElementById('shop');
            
            const paintings = [
                {title:"Cosmic Fracture", price:3200, img:"https://i.imgur.com/AF4KG1u.jpg"},
                {title:"Eye of the Vortex", price:2800, img:"https://i.imgur.com/EEOQNNJ.jpg"},
                {title:"The Void Prophet", price:3500, img:"https://i.imgur.com/GbIHN4w.jpg"},
                {title:"Multiversal Mind", price:2950, img:"https://i.imgur.com/bYa67XG.jpg"},
                {title:"Framed Eternity", price:2450, img:"https://i.imgur.com/TBcUee7.jpg"},
                {title:"Devouring Cosmos", price:3100, img:"https://i.imgur.com/N9cTjGr.jpg"},
                {title:"Celestial Embrace", price:2700, img:"https://i.imgur.com/Q13UqiZ.jpg"},
                {title:"Symphony of Madness", price:3800, img:"https://i.imgur.com/rlbRcTr.jpg"},
                {title:"Architect of Dreams", price:2900, img:"https://i.imgur.com/P06MY6x.jpg"},
                {title:"The Last Gate", price:3300, img:"https://i.imgur.com/errVUy7.jpg"},
                {title:"Eternal Flow", price:2600, img:"https://i.imgur.com/9ylCADA.jpg"},
                {title:"Mind Portal", price:3150, img:"https://i.imgur.com/42epfIs.jpg"},
                {title:"Cosmic Symphony", price:3400, img:"https://i.imgur.com/PX9FLqq.jpg"},
                {title:"The Final Vision", price:3600, img:"https://i.imgur.com/RnhfBpt.jpg"}
            ];

            paintings.forEach(p => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="frame">
                        <img src="${p.img}" alt="${p.title}">
                    </div>
                    <div style="padding: 28px 32px;">
                        <h3 class="heading" style="font-size: 1.65rem;">${p.title}</h3>
                        <p style="color: #d4af37; font-size: 1.7rem; margin-top: 8px;">$${p.price}</p>
                    </div>
                `;
                card.onclick = () => showModal(p);
                gallery.appendChild(card);
            });
        });

        function showModal(p) {
            document.getElementById('modal-image').src = p.img;
            document.getElementById('modal-title').textContent = p.title;
            document.getElementById('modal-price').textContent = '$' + p.price;
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }
    </script>
</body>
</html>
