<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlphaZibn • Surreal Visions</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap');
        
        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            background: #050505; 
            color: #e5e5e5; 
            margin: 0; 
            padding: 0; 
        }
        .heading { font-family: 'Playfair Display', serif; }

        .hero { 
            height: 100vh; 
            background: linear-gradient(rgba(5,5,5,0.8), rgba(5,5,5,0.95)), url('https://i.imgur.com/GbIHN4w.jpg') center/cover; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            text-align: center;
        }

        .gallery { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); 
            gap: 50px; 
            padding: 100px 40px; 
            max-width: 1700px; 
            margin: 0 auto; 
        }

        .card { 
            background: #0a0a0a; 
            border-radius: 12px; 
            overflow: hidden; 
            cursor: pointer; 
            transition: all 0.5s; 
        }
        .card:hover { transform: translateY(-15px); box-shadow: 0 30px 60px rgba(0,0,0,0.7); }

        .frame { padding: 28px; background: #111; border: 18px solid #1a1a1a; }
        .frame img { width: 100%; height: 420px; object-fit: cover; }

        /* Cart */
        .cart-drawer {
            position: fixed; top: 0; right: -500px; width: 480px; height: 100%; background: #0a0a0a; 
            box-shadow: -20px 0 50px rgba(0,0,0,0.9); transition: right 0.4s; z-index: 3000; overflow-y: auto;
        }
        .cart-drawer.open { right: 0; }

        /* Lightbox */
        .lightbox {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; 
            background: rgba(0,0,0,0.98); z-index: 2000; align-items: center; justify-content: center; padding: 20px;
        }
        .lightbox img { max-width: 96%; max-height: 94vh; border: 12px solid #1a1a1a; }
    </style>
</head>
<body>

    <header style="position: sticky; top: 0; background: rgba(5,5,5,0.98); backdrop-filter: blur(12px); z-index: 100; border-bottom: 1px solid #222;">
        <div style="max-width: 1700px; margin: 0 auto; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center;">
            <h1 class="heading" style="font-size: 2.3rem;">AlphaZibn</h1>
            <div onclick="toggleCart()" style="cursor:pointer; font-size:1.8rem; position:relative;">
                🛒 <span id="cart-count" style="position:absolute;top:-8px;right:-10px;background:#d4af37;color:#000;font-size:0.9rem;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold;">0</span>
            </div>
        </div>
    </header>

    <div class="hero">
        <div>
            <h1 class="heading" style="font-size:6.8rem;">AlphaZibn</h1>
            <p style="font-size:1.6rem;letter-spacing:6px;">SURREAL VISIONS</p>
        </div>
    </div>

    <section id="shop" class="gallery"></section>

    <!-- Cart Drawer -->
    <div id="cart-drawer" class="cart-drawer">
        <div style="padding:30px;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:30px;">
                <h2 class="heading">Your Cart</h2>
                <span onclick="toggleCart()" style="font-size:2.8rem;cursor:pointer;">×</span>
            </div>
            <div id="cart-items"></div>
            <div style="margin-top:40px;padding-top:25px;border-top:1px solid #333;">
                <div style="display:flex;justify-content:space-between;font-size:1.5rem;margin-bottom:25px;">
                    <span>Total</span>
                    <span id="cart-total" style="color:#d4af37;font-weight:bold;">$0</span>
                </div>
                <button onclick="proceedToCheckout()" style="width:100%;padding:20px;background:#d4af37;color:black;border:none;font-size:1.3rem;border-radius:8px;cursor:pointer;font-weight:600;">
                    Proceed to Checkout
                </button>
            </div>
        </div>
    </div>

    <!-- Lightbox -->
    <div id="lightbox" class="lightbox" onclick="this.style.display='none'">
        <img id="lightbox-image" alt="">
    </div>

    <script>
        let cart = [];

        document.addEventListener("DOMContentLoaded", () => {
            const gallery = document.getElementById('shop');
            const paintings = [
                {title:"Cosmic Fracture", price:3200, img:"https://i.imgur.com/AF4KG1u.jpg"},
                {title:"Eye of the Vortex", price:2800, img:"https://i.imgur.com/EEOQNNJ.jpg"},
                {title:"The Void Prophet", price:3500, img:"https://i.imgur.com/GbIHN4w.jpg"},
                {title:"Multiversal Mind", price:2950, img:"https://i.imgur.com/bYa67XG.jpg"},
                {title:"Framed Eternity", price:2450, img:"https://i.imgur.com/TBcUee7.jpg"},
                {title:"Devouring Cosmos", price:3100, img:"https://i.imgur.com/N9cTjGr.jpg"},
                {title:"Celestial Embrace", price:2700, img:"https://i.imgur.com/Q13UqiZ.jpg"},
                {title:"Symphony of Madness", price:3800, img:"https://i.imgur.com/rlbRcTr.jpg"},
                {title:"Architect of Dreams", price:2900, img:"https://i.imgur.com/P06MY6x.jpg"},
                {title:"The Last Gate", price:3300, img:"https://i.imgur.com/errVUy7.jpg"},
                {title:"Eternal Flow", price:2600, img:"https://i.imgur.com/9ylCADA.jpg"},
                {title:"Mind Portal", price:3150, img:"https://i.imgur.com/42epfIs.jpg"},
                {title:"Cosmic Symphony", price:3400, img:"https://i.imgur.com/PX9FLqq.jpg"},
                {title:"The Final Vision", price:3600, img:"https://i.imgur.com/RnhfBpt.jpg"}
            ];

            paintings.forEach(p => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="frame"><img src="${p.img}" alt="${p.title}"></div>
                    <div style="padding:25px 30px;">
                        <h3 class="heading" style="font-size:1.65rem;">${p.title}</h3>
                        <p style="color:#d4af37;font-size:1.75rem;margin:8px 0;">$${p.price}</p>
                        <button onclick="addToCart(event, '${p.title}', ${p.price}, '${p.img}')" 
                                style="margin-top:12px;width:100%;padding:12px;background:#d4af37;color:black;border:none;border-radius:6px;cursor:pointer;">
                            Add to Cart
                        </button>
                    </div>
                `;
                card.querySelector('img').parentElement.onclick = (e) => {
                    if (!e.target.closest('button')) showLightbox(p.img);
                };
                gallery.appendChild(card);
            });
        });

        function addToCart(e, title, price, img) {
            e.stopImmediatePropagation();
            cart.push({title, price, img});
            document.getElementById('cart-count').textContent = cart.length;
            alert(`✅ ${title} добавлен в корзину`);
        }

        function toggleCart() {
            const drawer = document.getElementById('cart-drawer');
            drawer.classList.toggle('open');
            if (drawer.classList.contains('open')) renderCart();
        }

        function renderCart() {
            const container = document.getElementById('cart-items');
            container.innerHTML = '';
            let total = 0;

            cart.forEach((item, index) => {
                total += item.price;
                const div = document.createElement('div');
                div.style = "display:flex; gap:15px; margin-bottom:25px; padding-bottom:20px; border-bottom:1px solid #333;";
                div.innerHTML = `
                    <img src="${item.img}" style="width:70px;height:70px;object-fit:cover;">
                    <div style="flex:1">
                        <h4>${item.title}</h4>
                        <p style="color:#d4af37;">$${item.price}</p>
                    </div>
                    <button onclick="removeFromCart(${index});" style="background:none;border:none;color:#aaa;font-size:1.6rem;cursor:pointer;">×</button>
                `;
                container.appendChild(div);
            });

            document.getElementById('cart-total').textContent = '$' + total;
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            document.getElementById('cart-count').textContent = cart.length;
            renderCart();
        }

        function proceedToCheckout() {
            if (cart.length === 0) return;
            const total = cart.reduce((sum, i) => sum + i.price, 0);
            alert(`🎉 Спасибо за заказ!\n\nВы купили ${cart.length} картин на сумму $${total}.\n\nВ реальной версии здесь будет оплата.`);
            cart = [];
            document.getElementById('cart-count').textContent = '0';
            toggleCart();
        }

        function showLightbox(src) {
            const lb = document.getElementById('lightbox');
            document.getElementById('lightbox-image').src = src;
            lb.style.display = 'flex';
        }

        // Close lightbox by clicking outside
        document.getElementById('lightbox').addEventListener('click', function(e) {
            if (e.target.id === 'lightbox') this.style.display = 'none';
        });
    </script>
</body>
</html>
