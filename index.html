<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlphaZibn • Surreal Visions</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap');
        
        body { font-family: 'Inter', system-ui, sans-serif; background: #050505; color: #e5e5e5; margin:0; padding:0; }
        .heading { font-family: 'Playfair Display', serif; }

        .hero { height: 100vh; background: linear-gradient(rgba(5,5,5,0.8), rgba(5,5,5,0.95)), url('https://i.imgur.com/GbIHN4w.jpg') center/cover; display:flex; align-items:center; justify-content:center; text-align:center; }

        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); gap: 50px; padding: 100px 40px; max-width: 1700px; margin: 0 auto; }

        .card { background: #0a0a0a; border-radius: 12px; overflow: hidden; cursor: pointer; transition: all 0.5s; }
        .card:hover { transform: translateY(-15px); }

        .frame { padding: 28px; background: #111; border: 18px solid #1a1a1a; }
        .frame img { width: 100%; height: 420px; object-fit: cover; }

        .cart-drawer {
            position: fixed; top: 0; right: -500px; width: 480px; height: 100%; background: #0a0a0a; box-shadow: -20px 0 40px rgba(0,0,0,0.9);
            transition: right 0.4s ease; z-index: 3000; overflow-y: auto;
        }
        .cart-drawer.open { right: 0; }
    </style>
</head>
<body>

    <header style="position: sticky; top: 0; background: rgba(5,5,5,0.98); backdrop-filter: blur(12px); z-index: 100; border-bottom: 1px solid #222;">
        <div style="max-width: 1700px; margin: 0 auto; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center;">
            <h1 class="heading" style="font-size: 2.3rem;">AlphaZibn</h1>
            <div onclick="toggleCart()" style="cursor:pointer; font-size:1.8rem; position:relative;">
                🛒 <span id="cart-count" style="position:absolute;top:-8px;right:-10px;background:#d4af37;color:#000;font-size:0.9rem;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold;">0</span>
            </div>
        </div>
    </header>

    <div class="hero">
        <div>
            <h1 class="heading" style="font-size:6.8rem;">AlphaZibn</h1>
            <p style="font-size:1.6rem;letter-spacing:6px;opacity:0.85;">SURREAL VISIONS</p>
        </div>
    </div>

    <section id="shop" class="gallery"></section>

    <!-- Cart Drawer -->
    <div id="cart-drawer" class="cart-drawer">
        <div style="padding:30px;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:30px;">
                <h2 class="heading">Your Cart</h2>
                <span onclick="toggleCart()" style="font-size:2.8rem;cursor:pointer;">×</span>
            </div>
            
            <div id="cart-items"></div>
            
            <div style="margin-top:40px;padding-top:25px;border-top:1px solid #333;">
                <div style="display:flex;justify-content:space-between;font-size:1.5rem;margin-bottom:25px;">
                    <span>Total</span>
                    <span id="cart-total" style="color:#d4af37;font-weight:bold;">$0</span>
                </div>
                <button onclick="proceedToCheckout()" 
                        style="width:100%;padding:20px;background:#d4af37;color:black;border:none;font-size:1.3rem;border-radius:8px;cursor:pointer;font-weight:600;">
                    Proceed to Checkout
                </button>
                <p style="text-align:center;margin-top:15px;font-size:0.95rem;opacity:0.7;">Secure checkout • Free shipping worldwide</p>
            </div>
        </div>
    </div>

    <script>
        let cart = [];

        // ... (остальной код галереи и lightbox остаётся тот же)

        document.addEventListener("DOMContentLoaded", function() {
            const gallery = document.getElementById('shop');
            const paintings = [ /* все 14 картин */ 
                {title:"Cosmic Fracture", price:3200, img:"https://i.imgur.com/AF4KG1u.jpg"},
                {title:"Eye of the Vortex", price:2800, img:"https://i.imgur.com/EEOQNNJ.jpg"},
                // ... добавь остальные 12 картин как в предыдущей версии
            ];

            paintings.forEach(p => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="frame"><img src="${p.img}"></div>
                    <div style="padding:25px 30px;">
                        <h3 class="heading" style="font-size:1.65rem;">${p.title}</h3>
                        <p style="color:#d4af37;font-size:1.75rem;margin:8px 0;">$${p.price}</p>
                        <button onclick="addToCart(event, '${p.title}', ${p.price}, '${p.img}')" 
                                style="margin-top:12px;width:100%;padding:12px;background:#d4af37;color:black;border:none;border-radius:6px;cursor:pointer;">
                            Add to Cart
                        </button>
                    </div>
                `;
                // Lightbox
                card.querySelector('img').parentElement.onclick = (e) => {
                    if (!e.target.closest('button')) showLightbox(p.img);
                };
                gallery.appendChild(card);
            });
        });

        function addToCart(e, title, price, img) {
            e.stopImmediatePropagation();
            cart.push({title, price, img});
            updateCartCount();
            alert(`✅ ${title} добавлен в корзину`);
        }

        function updateCartCount() {
            document.getElementById('cart-count').textContent = cart.length;
        }

        function toggleCart() {
            const drawer = document.getElementById('cart-drawer');
            if (drawer.classList.contains('open')) {
                drawer.classList.remove('open');
            } else {
                renderCart();
                drawer.classList.add('open');
            }
        }

        function renderCart() {
            const container = document.getElementById('cart-items');
            container.innerHTML = '';
            let total = 0;

            if (cart.length === 0) {
                container.innerHTML = '<p style="text-align:center;padding:60px 0;opacity:0.6;">Корзина пуста</p>';
                document.getElementById('cart-total').textContent = '$0';
                return;
            }

            cart.forEach((item, i) => {
                total += item.price;
                const div = document.createElement('div');
                div.style.marginBottom = "25px";
                div.innerHTML = `
                    <div style="display:flex;gap:15px;">
                        <img src="${item.img}" style="width:70px;height:70px;object-fit:cover;">
                        <div style="flex:1">
                            <h4>${item.title}</h4>
                            <p style="color:#d4af37;">$${item.price}</p>
                        </div>
                        <button onclick="removeFromCart(${i});" style="background:none;border:none;color:#888;font-size:1.6rem;cursor:pointer;">×</button>
                    </div>
                `;
                container.appendChild(div);
            });

            document.getElementById('cart-total').textContent = '$' + total;
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCartCount();
            renderCart();
        }

        function proceedToCheckout() {
            if (cart.length === 0) return;
            
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            
            const message = `Спасибо за заказ!\n\n` +
                `Вы приобрели ${cart.length} картин на сумму $${total}.\n\n` +
                `В реальной версии здесь будет форма оплаты (Stripe / PayPal) и подтверждение заказа.\n\n` +
                `Хотите, чтобы я сделал форму для сбора контактов (имя, email, телефон)?`;

            alert(message);
            
            // Очищаем корзину после "оплаты"
            cart = [];
            updateCartCount();
            toggleCart();
        }

        function showLightbox(src) {
            const lb = document.createElement('div');
            lb.style = "position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.98);z-index:2000;display:flex;align-items:center;justify-content:center;padding:20px;cursor:zoom-out;";
            lb.innerHTML = `<img src="${src}" style="max-width:96%;max-height:94vh;border:12px solid #1a1a1a;" onclick="this.parentElement.remove()">`;
            document.body.appendChild(lb);
        }
    </script>
</body>
</html>
