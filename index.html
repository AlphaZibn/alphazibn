<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlphaZibn • Surreal Visions</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap');
        
        body { font-family: 'Inter', system-ui, sans-serif; background:#050505; color:#e5e5e5; margin:0; padding:0; }
        .heading { font-family: 'Playfair Display', serif; }

        .hero { height:100vh; background: linear-gradient(rgba(5,5,5,0.8),rgba(5,5,5,0.95)), url('https://i.imgur.com/GbIHN4w.jpg') center/cover; display:flex; align-items:center; justify-content:center; text-align:center; }
        .gallery { display:grid; grid-template-columns:repeat(auto-fit, minmax(360px,1fr)); gap:50px; padding:100px 40px; max-width:1700px; margin:0 auto; }
        .card { background:#0a0a0a; border-radius:12px; overflow:hidden; cursor:pointer; transition:0.5s; }
        .card:hover { transform:translateY(-15px); }
        .frame { padding:28px; background:#111; border:18px solid #1a1a1a; }
        .frame img { width:100%; height:420px; object-fit:cover; }
    </style>
</head>
<body>

    <header style="position:sticky;top:0;background:rgba(5,5,5,0.98);backdrop-filter:blur(12px);z-index:100;border-bottom:1px solid #222;">
        <div style="max-width:1700px;margin:0 auto;padding:20px 40px;display:flex;justify-content:space-between;align-items:center;">
            <h1 class="heading" style="font-size:2.3rem;">AlphaZibn</h1>
            <nav style="display:flex;gap:40px;">
                <a href="#shop" style="color:#ddd;text-decoration:none;">Shop</a>
                <a href="#about" style="color:#ddd;text-decoration:none;">About</a>
            </nav>
        </div>
    </header>

    <div class="hero">
        <div>
            <h1 class="heading" style="font-size:6.8rem;">AlphaZibn</h1>
            <p style="font-size:1.6rem;letter-spacing:6px;">SURREAL VISIONS</p>
        </div>
    </div>

    <section id="shop" class="gallery"></section>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const gallery = document.getElementById('shop');
            const paintings = [
                {title:"Cosmic Fracture", price:3200, img:"https://i.imgur.com/AF4KG1u.jpg", stripe:"https://buy.stripe.com/00w14nbWcaKC5290vP8bS00"},
                {title:"Eye of the Vortex", price:2800, img:"https://i.imgur.com/EEOQNNJ.jpg", stripe:""},
                {title:"The Void Prophet", price:3500, img:"https://i.imgur.com/GbIHN4w.jpg", stripe:""},
                {title:"Multiversal Mind", price:2950, img:"https://i.imgur.com/bYa67XG.jpg", stripe:""},
                {title:"Framed Eternity", price:2450, img:"https://i.imgur.com/TBcUee7.jpg", stripe:""},
                {title:"Devouring Cosmos", price:3100, img:"https://i.imgur.com/N9cTjGr.jpg", stripe:""},
                {title:"Celestial Embrace", price:2700, img:"https://i.imgur.com/Q13UqiZ.jpg", stripe:""},
                {title:"Symphony of Madness", price:3800, img:"https://i.imgur.com/rlbRcTr.jpg", stripe:""},
                {title:"Architect of Dreams", price:2900, img:"https://i.imgur.com/P06MY6x.jpg", stripe:""},
                {title:"The Last Gate", price:3300, img:"https://i.imgur.com/errVUy7.jpg", stripe:""},
                {title:"Eternal Flow", price:2600, img:"https://i.imgur.com/9ylCADA.jpg", stripe:""},
                {title:"Mind Portal", price:3150, img:"https://i.imgur.com/42epfIs.jpg", stripe:""},
                {title:"Cosmic Symphony", price:3400, img:"https://i.imgur.com/PX9FLqq.jpg", stripe:""},
                {title:"The Final Vision", price:3600, img:"https://i.imgur.com/RnhfBpt.jpg", stripe:""}
            ];

            paintings.forEach(p => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="frame"><img src="${p.img}"></div>
                    <div style="padding:25px 30px;">
                        <h3 class="heading" style="font-size:1.65rem;">${p.title}</h3>
                        <p style="color:#d4af37;font-size:1.75rem;margin:8px 0;">$${p.price}</p>
                        ${p.stripe ? 
                            `<button onclick="window.open('${p.stripe}', '_blank')" style="margin-top:12px;width:100%;padding:12px;background:#22d3ee;color:black;border:none;border-radius:6px;cursor:pointer;">Buy Now</button>` : 
                            `<button onclick="alert('Payment link coming soon')" style="margin-top:12px;width:100%;padding:12px;background:#666;color:white;border:none;border-radius:6px;cursor:pointer;">Buy Now</button>`
                        }
                    </div>
                `;
                card.querySelector('img').parentElement.onclick = () => alert(`Opened: ${p.title}`);
                gallery.appendChild(card);
            });
        });
    </script>
</body>
</html>
